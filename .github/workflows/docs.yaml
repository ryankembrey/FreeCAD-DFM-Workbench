name: Build and Deploy Docs
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install sphinx furo pyyaml

      - name: Build HTML
        run: |
          touch docs/source/.nojekyll 
          sphinx-apidoc -f -o  docs/source/ . gui/DFM_rc.py Init.py InitGui.py
          cd docs
          export PYTHONPATH=$PYTHONPATH:$(pwd)/..
          make clean
          make html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build/html
          force_orphan: true
